<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Rig Gallery — Real Results</title>
    <meta name="description" content="Browse real rigging results from AutoRig.Online. Explore newest gallery files by rig type with pagination.">

    <!-- Open Graph -->
    <meta property="og:title" content="AutoRig Gallery - Real Results">
    <meta property="og:description" content="Browse real auto-rigged tasks by rig type and paginate through the newest results.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://autorig.online/gallery">
    <meta property="og:image" content="https://autorig.online/static/images/og-image.png">

    <!-- Styles -->
    <link rel="stylesheet" href="/static/css/styles.css?v=gallery-stats-rigtypes-1">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-T4E781EHE4"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-T4E781EHE4');
    </script>
</head>
<body data-layout-free3d-init="none">
    <div id="site-header"></div>

    <main>
        <section class="hero">
        <div class="container">
                <h1 class="text-gradient" data-i18n="gallery_page_title">Gallery</h1>
                <p class="hero-subtitle" data-i18n="gallery_page_subtitle">Real completed tasks. Browse newest results by rig type.</p>
            </div>
        </section>

        <section class="container mt-4">
            <div class="card" style="padding: 2rem;">
                <div class="gallery-controls">
                    <div>
                        <div style="font-weight: 700; font-size: 1.1rem;" data-i18n="gallery_all_works">All works</div>
                        <div id="gallery-total" style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.25rem;">—</div>
                    </div>
                    <div style="display:flex; gap: 0.75rem; align-items:center; flex-wrap: wrap; justify-content:flex-end;">
                        <label style="color: var(--text-secondary); font-size: 0.9rem;" data-i18n="gallery_rig_type_label">Rig type:</label>
                        <select id="gallery-rig-type" class="form-select" style="width: 220px;">
                            <option value="all" data-i18n="gallery_rig_type_all">All rig types</option>
                            <option value="humanoid" data-i18n="gallery_rig_type_humanoid">Humanoid</option>
                            <option value="dog" data-i18n="gallery_rig_type_dog">Dog</option>
                            <option value="bear" data-i18n="gallery_rig_type_bear">Bear</option>
                            <option value="cat" data-i18n="gallery_rig_type_cat">Cat</option>
                            <option value="cow" data-i18n="gallery_rig_type_cow">Cow</option>
                            <option value="deer" data-i18n="gallery_rig_type_deer">Deer</option>
                            <option value="elephant" data-i18n="gallery_rig_type_elephant">Elephant</option>
                            <option value="giraffe" data-i18n="gallery_rig_type_giraffe">Giraffe</option>
                            <option value="horse" data-i18n="gallery_rig_type_horse">Horse</option>
                            <option value="mouse" data-i18n="gallery_rig_type_mouse">Mouse</option>
                            <option value="pig" data-i18n="gallery_rig_type_pig">Pig</option>
                            <option value="rabbit" data-i18n="gallery_rig_type_rabbit">Rabbit</option>
                            <option value="turtle" data-i18n="gallery_rig_type_turtle">Turtle</option>
                        </select>
                    </div>
                </div>

                <div id="gallery-grid" class="gallery-grid-dyn">
                    <div class="card" style="padding: 1rem; color: var(--text-muted);">Loading…</div>
                </div>

                <div class="gallery-pagination">
                    <button class="btn btn-secondary" id="gallery-prev" data-i18n="gallery_prev">Prev</button>
                    <div id="gallery-page" style="color: var(--text-secondary); font-size: 0.9rem;">Page 1</div>
                    <button class="btn btn-secondary" id="gallery-next" data-i18n="gallery_next">Next</button>
            </div>
        </div>
    </section>
    </main>
    <div id="site-footer"></div>

    <!-- Scripts -->
        <script src="/static/js/header.js?v=20260324-sitelayout"></script>
    <script src="/static/js/footer.js?v=20260516-producthunt"></script>
    <script src="/static/js/site-layout.js?v=20260430-supportfix"></script>
<script src="/static/js/i18n.js"></script>
    <script src="/static/js/rig-icons.js?v=rigicons1"></script>
    <script src="/static/js/task-card.js?v=gallery-stats-rigtypes-1"></script>
    <script src="/static/js/app.js?v=gallery-rigtype-filter-1"></script>
    <script>
        const GalleryPage = {
            page: 1,
            perPage: 24,
            sort: 'date',
            rigType: (() => {
                const value = new URLSearchParams(window.location.search).get('rig_type') || 'all';
                const allowed = ['all', 'humanoid', 'dog', 'bear', 'cat', 'cow', 'deer', 'elephant', 'giraffe', 'horse', 'mouse', 'pig', 'rabbit', 'turtle'];
                return allowed.includes(value) ? value : 'all';
            })(),
            loading: false,

            async load() {
                if (this.loading) return;
                this.loading = true;

                const grid = document.getElementById('gallery-grid');
                const totalEl = document.getElementById('gallery-total');
                const pageEl = document.getElementById('gallery-page');
                const prevBtn = document.getElementById('gallery-prev');
                const nextBtn = document.getElementById('gallery-next');

                try {
                    grid.innerHTML = `<div class="card" style="padding: 1rem; color: var(--text-muted);">${(typeof window.t === 'function') ? t('gallery_loading') : 'Loading…'}</div>`;

                    const params = new URLSearchParams({
                        page: String(this.page),
                        per_page: String(this.perPage),
                        sort: this.sort,
                        rig_type: this.rigType
                    });
                    const resp = await fetch(`/api/gallery?${params.toString()}`);
                    const data = await resp.json();

                    const items = (data && data.items) ? data.items : [];
                    const total = (data && typeof data.total === 'number') ? data.total : 0;
                    const hasMore = !!(data && data.has_more);

                    totalEl.textContent = (typeof window.t === 'function')
                        ? t('gallery_total', { count: total })
                        : `Total: ${total}`;
                    pageEl.textContent = (typeof window.t === 'function')
                        ? t('gallery_page', { page: this.page })
                        : `Page ${this.page}`;
                    prevBtn.disabled = this.page <= 1;
                    nextBtn.disabled = !hasMore;

                    if (!items.length) {
                        grid.innerHTML = `<div class="card" style="padding: 1rem; color: var(--text-muted);">${(typeof window.t === 'function') ? t('gallery_empty') : '—'}</div>`;
                        return;
                    }

                    grid.innerHTML = items.map(it => {
                        const modelUrl = `/task?id=${encodeURIComponent(it.task_id)}`;
                        const thumbUrl = it.thumbnail_url || `/thumb/${it.task_id}`;
                        const videoUrl = it.video_url || `/api/video/${it.task_id}`;
                        const timeAgo = it.time_ago || '';
                        const openLabel = (typeof window.t === 'function') ? t('gallery_open') : 'Open';
                        const rigKey = (typeof it.rig_icon_key === 'string' && it.rig_icon_key) ? it.rig_icon_key : 'humanoid';
                        const rigSrc = (typeof resolveRigIconUrl === 'function')
                            ? resolveRigIconUrl(rigKey)
                            : `/static/Icons_png/${rigKey === 'humanoid' ? 'Human' : (rigKey.charAt(0).toUpperCase() + rigKey.slice(1))}.png?v=rigicons1`;
                        const rigBadge = `<span class="gallery-rig-icon" title="Rig type"><img src="${rigSrc}" alt="" width="64" height="64" loading="lazy" decoding="async" aria-hidden="true"></span>`;
                        return `
                            <a href="${modelUrl}" class="gallery-card" data-task-id="${it.task_id}" data-video-url="${videoUrl}" style="text-decoration:none;">
                                <div class="gallery-card-media">
                                    <img src="${thumbUrl}" loading="lazy" alt="">
                                    ${rigBadge}
                                </div>
                                <div class="gallery-card-meta">
                                    <span class="gallery-time">${timeAgo}</span>
                                    <span class="btn btn-ghost" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;">${openLabel}</span>
                                </div>
                            </a>
                        `;
                    }).join('');

                    // lazy fade-in
                    grid.querySelectorAll('img[loading=\"lazy\"]').forEach(img => {
                        const markLoaded = () => img.classList.add('loaded');
                        img.addEventListener('load', markLoaded, { once: true });
                        img.addEventListener('error', markLoaded, { once: true });
                        if (img.complete) markLoaded();
                    });

                    // Video playback on hover/visibility
                    grid.querySelectorAll('a[data-video-url]').forEach(card => {
                        const media = card.querySelector('.gallery-card-media');
                        const thumb = media?.querySelector('img');
                        const videoUrl = card.getAttribute('data-video-url');

                        const startVideo = () => {
                            if (!media || !videoUrl) return;
                            if (media.querySelector('video')) return;
                            const v = document.createElement('video');
                            v.src = videoUrl;
                            v.muted = true;
                            v.playsInline = true;
                            v.loop = true;
                            v.preload = 'metadata';
                            v.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;';
                            media.appendChild(v);
                            if (thumb) { thumb.style.transition = 'opacity 0.15s'; thumb.style.opacity = '1'; }
                            v.addEventListener('playing', () => { if (thumb) thumb.style.opacity = '0'; }, { once: true });
                            v.play().catch(() => {});
                        };

                        const stopVideo = () => {
                            const v = media?.querySelector('video');
                            if (!v) return;
                            try { v.pause(); v.removeAttribute('src'); v.load(); } catch (_) {}
                            v.remove();
                            if (thumb) thumb.style.opacity = '1';
                        };

                        card.addEventListener('mouseenter', startVideo);
                        card.addEventListener('mouseleave', stopVideo);
                    });

                } finally {
                    this.loading = false;
                }
            },

            init() {
                const rigTypeEl = document.getElementById('gallery-rig-type');
                const prevBtn = document.getElementById('gallery-prev');
                const nextBtn = document.getElementById('gallery-next');

                if (rigTypeEl) {
                    rigTypeEl.value = this.rigType;
                    rigTypeEl.addEventListener('change', () => {
                        this.rigType = rigTypeEl.value || 'all';
                        this.page = 1;
                        const url = new URL(window.location.href);
                        if (this.rigType === 'all') {
                            url.searchParams.delete('rig_type');
                        } else {
                            url.searchParams.set('rig_type', this.rigType);
                        }
                        window.history.replaceState({}, '', url);
                        this.load();
                    });
                }

                prevBtn?.addEventListener('click', () => {
                    if (this.page > 1) {
                        this.page -= 1;
                        this.load();
                    }
                });

                nextBtn?.addEventListener('click', () => {
                    this.page += 1;
                    this.load();
                });

                // Re-render text on language change.
                window.addEventListener('languageChanged', () => {
                    this.load();
                });

                this.load();
            }
        };

        document.addEventListener('DOMContentLoaded', () => GalleryPage.init());
    </script>
</body>
</html>
