<header class="header">
    <div class="container">
        <div class="header-inner">
            <a href="/" class="logo" aria-label="AutoRig.online home">
                <img src="/static/images/logo/autorig-logo.png"
                     srcset="/static/images/logo/autorig-logo.png 1x, /static/images/logo/autorig-logo@2x.png 2x"
                     alt="AutoRig.online"
                     class="logo-img"
                     width="120"
                     height="80">
            </a>

            <nav class="nav" aria-label="Primary navigation">
                <a href="/guides" class="nav-link" data-i18n="nav_guides">Guides</a>
                <a href="/gallery" class="nav-link" data-i18n="nav_gallery">Gallery</a>
                <a href="/animal-rig" class="nav-link" data-i18n="nav_animal_rig">Animals</a>
                <a href="/buy-credits" class="nav-link" data-i18n="nav_buy">Buy</a>
                <a href="/blender-plugin" class="nav-link" data-i18n="nav_blender_plugin">Blender Plugin</a>
                <a href="/developers" class="nav-link" data-i18n="nav_api">API</a>
                <a href="#" class="nav-link header-admin-tab hidden" id="header-admin-tab" title="Admin queue monitor">ADMIN</a>
            </nav>

            <div class="header-actions">
                <div class="credits-badge">
                    <span id="credits-label" data-i18n="credits_free">Free conversions left</span>
                    <span class="count" id="credits-count">0</span>
                </div>

                <div class="lang-selector">
                    <button class="lang-btn" type="button" aria-label="Language">
                        <span>EN</span>
                        <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor" aria-hidden="true">
                            <path d="M3 4.5L6 7.5L9 4.5"/>
                        </svg>
                    </button>
                    <div class="lang-dropdown">
                        <button class="lang-option" type="button" data-lang="en">English</button>
                        <button class="lang-option" type="button" data-lang="ru">Russian</button>
                        <button class="lang-option" type="button" data-lang="zh">Chinese</button>
                        <button class="lang-option" type="button" data-lang="hi">Hindi</button>
                    </div>
                </div>

                <button class="theme-toggle" id="theme-toggle" type="button" title="Toggle theme">Theme</button>

                <a href="/auth/login" class="btn btn-google" id="login-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span data-i18n="btn_login">Sign in with Google</span>
                </a>

                <div id="user-info" class="hidden flex items-center gap-2">
                    <a href="/dashboard" class="user-account-hit" title="Dashboard">
                        <img class="user-avatar" src="" alt="" style="width:32px;height:32px;border-radius:50%;">
                        <span class="user-name"></span>
                    </a>
                    <a href="/auth/logout" class="btn btn-ghost" data-i18n="btn_logout">Sign out</a>
                </div>
            </div>
        </div>
    </div>
</header>
