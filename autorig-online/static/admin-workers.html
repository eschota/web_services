<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Workers | Admin Panel | AutoRig.online</title>

    <!-- Styles -->
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body data-layout-free3d-init="none">
    <div id="site-header"></div>

    <main class="container" style="padding-top: 2rem;">
        <div class="flex justify-between items-center" style="gap: 1rem; flex-wrap: wrap;">
            <div>
                <h1>Workers</h1>
                <div style="color: var(--text-muted); font-size: 0.9rem;">
                    <a href="/admin" class="nav-link" style="padding: 0;">Back to Admin</a>
                </div>
            </div>
            <div style="color: var(--text-muted);">
                Total: <span id="workers-total">-</span>,
                Enabled: <span id="workers-enabled">-</span>
            </div>
        </div>

        <div class="card mt-4">
            <div class="card-header" style="flex-wrap: wrap; gap: 1rem;">
                <h3 class="card-title">Add worker</h3>
                <form id="add-worker-form" style="display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: end;">
                    <div class="form-group" style="margin: 0;">
                        <label class="form-label">URL</label>
                        <input type="text" class="form-input" id="new-worker-url" placeholder="http://host:port/api-converter-glb" style="width: 520px;">
                    </div>
                    <div class="form-group" style="margin: 0;">
                        <label class="form-label">Weight</label>
                        <input type="number" class="form-input" id="new-worker-weight" value="0" style="width: 120px;">
                    </div>
                    <div class="form-group" style="margin: 0;">
                        <label class="form-label">Enabled</label>
                        <input type="checkbox" id="new-worker-enabled" checked style="width: 18px; height: 18px;">
                    </div>
                    <button type="submit" class="btn btn-primary" id="add-worker-btn">Add</button>
                </form>
            </div>

            <div style="overflow-x: auto;">
                <table class="admin-table" style="min-width: 900px;">
                    <thead>
                        <tr>
                            <th style="width: 80px;">ID</th>
                            <th>URL</th>
                            <th style="width: 120px;">Weight</th>
                            <th style="width: 110px;">Enabled</th>
                            <th style="width: 110px;">Done</th>
                            <th style="width: 110px;">Total</th>
                            <th style="width: 120px;">Done share</th>
                            <th style="width: 160px;">Updated</th>
                            <th style="width: 170px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="workers-table">
                        <tr>
                            <td colspan="9" style="text-align: center; color: var(--text-muted);">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <div id="site-footer"></div>

        <script src="/static/js/header.js?v=20260324-sitelayout"></script>
    <script src="/static/js/footer.js?v=20260324-sitelayout"></script>
    <script src="/static/js/site-layout.js?v=20260324-sitelayout"></script>
<script src="/static/js/i18n.js?v=workers-3"></script>
    <script src="/static/js/admin-workers.js?v=workers-3"></script>
    <script src="/static/js/app.js?v=workers-3"></script>
</body>
</html>
