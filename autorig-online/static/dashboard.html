<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="dashboard_page_title">Dashboard | AutoRig.online</title>
    <meta name="description" content="Manage email notifications for AutoRig.online">
    <link rel="icon" type="image/svg+xml" href="/static/images/logo/favicon.svg">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body data-layout-free3d-init="none" data-layout-active-path="/dashboard">
    <div id="site-header"></div>

    <main style="padding: 3rem 0;">
        <div class="container" style="max-width: 640px;">
            <h1 style="margin-top: 0;" data-i18n="dashboard_heading">Dashboard</h1>

            <div id="dashboard-loading" class="card" style="padding: 2rem; color: var(--text-secondary);" data-i18n="dashboard_loading">
                Loading…
            </div>

            <div id="dashboard-guest" class="card hidden" style="padding: 2rem;">
                <h2 style="margin-top: 0; font-size: 1.15rem;" data-i18n="dashboard_guest_title">Sign in required</h2>
                <p style="color: var(--text-secondary); line-height: 1.6;" data-i18n="dashboard_guest_body">
                    Sign in with Google to manage email notification settings.
                </p>
                <p style="margin-top: 1rem;">
                    <a class="btn btn-google" id="dashboard-login-link" href="/auth/login">Sign in with Google</a>
                </p>
            </div>

            <div id="dashboard-settings" class="card hidden" style="padding: 2rem;">
                <h2 style="margin-top: 0; font-size: 1.15rem;" data-i18n="dashboard_notifications_title">Notifications</h2>
                <label style="display: flex; align-items: flex-start; gap: 0.75rem; cursor: pointer; color: var(--text-secondary); line-height: 1.5;">
                    <input type="checkbox" id="dashboard-email-tasks" style="margin-top: 0.2rem;">
                    <span data-i18n="dashboard_email_tasks_label">Email me when a rigging task is ready</span>
                </label>
                <div style="margin-top: 1.25rem; display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center;">
                    <button type="button" class="btn btn-primary" id="dashboard-save-btn" disabled data-i18n="dashboard_save_btn">Save</button>
                    <span id="dashboard-save-status" role="status" aria-live="polite" style="font-size: 0.9rem; min-height: 1.25rem;"></span>
                </div>
            </div>
        </div>
    </main>

    <div id="site-footer"></div>

    <script src="/static/js/header.js?v=20260326-dashsave"></script>
    <script src="/static/js/footer.js?v=20260326-dashsave"></script>
    <script src="/static/js/site-layout.js?v=20260326-dashsave"></script>
    <script src="/static/js/i18n.js"></script>
    <script>
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('autorig_theme', theme);
            const toggle = document.getElementById('theme-toggle');
            if (toggle) toggle.textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        function setupThemeToggle() {
            const savedTheme = localStorage.getItem('autorig_theme') || 'dark';
            setTheme(savedTheme);
            const toggle = document.getElementById('theme-toggle');
            toggle?.addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-theme');
                setTheme(current === 'dark' ? 'light' : 'dark');
            });
        }

        function setupLangSelector() {
            const btn = document.querySelector('.lang-btn');
            const dropdown = document.querySelector('.lang-dropdown');
            btn?.addEventListener('click', () => dropdown?.classList.toggle('open'));
            document.querySelectorAll('.lang-option').forEach(opt => {
                opt.addEventListener('click', async () => {
                    const lang = opt.getAttribute('data-lang');
                    await I18n.setLanguage(lang);
                    dropdown?.classList.remove('open');
                });
            });
        }

        async function updateCreditsUI() {
            try {
                const resp = await fetch('/auth/me', { credentials: 'same-origin' });
                const data = await resp.json();
                const creditsEl = document.getElementById('credits-count');
                const labelEl = document.getElementById('credits-label');
                if (labelEl) labelEl.textContent = I18n.t('credits_remaining');
                if (creditsEl) creditsEl.textContent = data.credits_remaining ?? '-';
            } catch (e) {
                console.error('Auth load failed:', e);
            }
        }

        async function initDashboard() {
            const loadingEl = document.getElementById('dashboard-loading');
            const guestEl = document.getElementById('dashboard-guest');
            const settingsEl = document.getElementById('dashboard-settings');
            const loginLink = document.getElementById('dashboard-login-link');
            const cb = document.getElementById('dashboard-email-tasks');

            const next = window.location.pathname + window.location.search;
            if (loginLink) {
                loginLink.href = '/auth/login?next=' + encodeURIComponent(next);
            }

            try {
                const resp = await fetch('/auth/me', { credentials: 'same-origin' });
                const raw = await resp.text();
                let data;
                try {
                    data = JSON.parse(raw);
                } catch (parseErr) {
                    console.error('[Dashboard] /auth/me not JSON:', parseErr);
                    guestEl.classList.remove('hidden');
                    return;
                }

                if (!data.authenticated || !data.user) {
                    guestEl.classList.remove('hidden');
                    return;
                }

                settingsEl.classList.remove('hidden');
                const saveBtn = document.getElementById('dashboard-save-btn');
                const statusEl = document.getElementById('dashboard-save-status');

                function baselineFromUser(u) {
                    return u.email_task_completed !== false;
                }

                let savedBaseline = baselineFromUser(data.user);
                cb.checked = savedBaseline;

                function syncSaveButton() {
                    const dirty = cb.checked !== savedBaseline;
                    saveBtn.disabled = !dirty;
                }

                function setStatus(kind, text) {
                    statusEl.textContent = text || '';
                    statusEl.style.color =
                        kind === 'error' ? 'var(--error, #f87171)' :
                        kind === 'success' ? 'var(--success, #34d399)' :
                        'var(--text-muted, #888)';
                }

                cb.addEventListener('change', () => {
                    setStatus('', '');
                    syncSaveButton();
                });

                saveBtn.addEventListener('click', async () => {
                    if (saveBtn.disabled) return;
                    setStatus('', '');
                    saveBtn.disabled = true;
                    saveBtn.textContent = I18n.t('dashboard_saving');
                    try {
                        const r = await fetch('/api/user/notification-settings', {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email_task_completed: cb.checked }),
                            credentials: 'same-origin'
                        });
                        const raw = await r.text();
                        let payload = null;
                        try {
                            payload = raw ? JSON.parse(raw) : null;
                        } catch (_) {
                            payload = null;
                        }
                        if (!r.ok) {
                            const detail = payload && payload.detail != null
                                ? (typeof payload.detail === 'string' ? payload.detail : JSON.stringify(payload.detail))
                                : raw || I18n.t('dashboard_error_save');
                            setStatus('error', detail);
                            syncSaveButton();
                            return;
                        }
                        if (payload && typeof payload.email_task_completed === 'boolean') {
                            savedBaseline = payload.email_task_completed;
                            cb.checked = savedBaseline;
                            setStatus(
                                'success',
                                savedBaseline
                                    ? I18n.t('dashboard_save_success_on')
                                    : I18n.t('dashboard_save_success_off')
                            );
                        } else {
                            setStatus('success', I18n.t('dashboard_save_success_generic'));
                            savedBaseline = cb.checked;
                        }
                        syncSaveButton();
                    } catch (e) {
                        console.error(e);
                        setStatus('error', I18n.t('dashboard_error_save'));
                        syncSaveButton();
                    } finally {
                        saveBtn.textContent = I18n.t('dashboard_save_btn');
                    }
                });

                syncSaveButton();
            } catch (e) {
                console.error('[Dashboard] init failed:', e);
                guestEl.classList.remove('hidden');
            } finally {
                loadingEl?.classList.add('hidden');
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await I18n.init();
            setupThemeToggle();
            setupLangSelector();
            await updateCreditsUI();
            await initDashboard();
        });
    </script>
</body>
</html>
