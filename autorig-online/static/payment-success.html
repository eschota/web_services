<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Success | AutoRig.online</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body data-layout-free3d-init="none">
    <div id="site-header"></div>

    <main style="padding: 3rem 0;">
        <div class="container" style="max-width: 820px;">
            <div class="card" style="padding: 2rem;">
                <h1 style="margin-top: 0;" data-i18n="payment_success_title">Payment successful</h1>
                <p style="color: var(--text-secondary);" data-i18n="payment_success_desc">
                    Payment successful. Credits will appear shortly (usually within 1–2 minutes).
                </p>
                <div style="display:flex; gap: 0.75rem; margin-top: 1.25rem; flex-wrap: wrap;">
                    <a class="btn btn-primary" href="/" data-i18n="payment_success_back">Back to Home</a>
                    <a class="btn btn-secondary" href="/buy-credits" data-i18n="payment_success_buy">Buy more credits</a>
                </div>
            </div>
        </div>
    </main>
    <div id="site-footer"></div>

        <script src="/static/js/header.js?v=20260324-sitelayout"></script>
    <script src="/static/js/footer.js?v=20260324-sitelayout"></script>
    <script src="/static/js/site-layout.js?v=20260324-sitelayout"></script>
<script src="/static/js/i18n.js"></script>
    <script>
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('autorig_theme', theme);
            const toggle = document.getElementById('theme-toggle');
            if (toggle) toggle.textContent = theme === 'dark' ? '☀️' : '🌙';
        }
        function setupThemeToggle() {
            const savedTheme = localStorage.getItem('autorig_theme') || 'dark';
            setTheme(savedTheme);
            const toggle = document.getElementById('theme-toggle');
            toggle?.addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-theme');
                setTheme(current === 'dark' ? 'light' : 'dark');
            });
        }
        function setupLangSelector() {
            const btn = document.querySelector('.lang-btn');
            const dropdown = document.querySelector('.lang-dropdown');
            btn?.addEventListener('click', () => dropdown?.classList.toggle('open'));
            document.querySelectorAll('.lang-option').forEach(opt => {
                opt.addEventListener('click', async () => {
                    const lang = opt.getAttribute('data-lang');
                    await I18n.setLanguage(lang);
                    dropdown?.classList.remove('open');
                });
            });
        }
        document.addEventListener('DOMContentLoaded', async () => {
            await I18n.init();
            setupThemeToggle();
            setupLangSelector();
        });
    </script>
</body>
</html>
