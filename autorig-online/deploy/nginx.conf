# AutoRig Online Nginx Configuration
# Place this in /etc/nginx/sites-available/autorig.online

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;

server {
    listen 80;
    server_name autorig.online www.autorig.online;
    
    # Redirect to HTTPS
    return 301 https://autorig.online$request_uri;
}

server {
    listen 443 ssl http2;
    server_name autorig.online;
    
    # SSL Configuration (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/autorig.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autorig.online/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    
    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;
    
    # Security headers
    # Allow Telegram WebApp iframe (replaces X-Frame-Options)
    add_header Content-Security-Policy "frame-ancestors 'self' https://web.telegram.org https://*.telegram.org" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Root directory — production tree lives directly in the git checkout.
    root /root/autorig-online/static;
    index index.html;
    
    # Client body size for uploads
    client_max_body_size 128M;
    
    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    
    # Static files with caching
    location /static/ {
        alias /root/autorig-online/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";

        # MIME types for specific file types
        location ~* \.svg$ {
            add_header Content-Type "image/svg+xml; charset=utf-8";
        }
    }
    
    # Task cache is private storage. Files are served only through owner/admin
    # API routes after authorization checks.
    location ^~ /static/tasks/ {
        return 404;
    }
    
    # Uploaded files (temporary storage)
    location /u/ {
        alias /var/autorig/uploads/;
        expires 24h;
        add_header Cache-Control "public";
    }
    
    # Face rig analysis can legitimately wait on upstream processing longer
    # than the general API budget, so keep a dedicated timeout here.
    location ~ ^/api/task/.+/face-rig/analyze-head$ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Full-task ZIP: stream from FastAPI → worker; long read; disable buffering so download starts immediately.
    location ~ ^/api/task/.+/(downloads/bundle|bundle\.zip)$ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 120s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Large task artifacts may require a longer upstream wait on the first hit
    # while the backend downloads and caches them from a worker.
    location ~ ^/api/task/.+/(prepared\.glb|animations\.glb|model\.glb|animations/preview/.+)$ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # API endpoints
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # API task create with stricter rate limit
    location /api/task/create {
        limit_req zone=upload_limit burst=5 nodelay;
        
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Longer timeout for uploads
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
    
    # Auth endpoints
    location /auth/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
    }

    # Developer API docs (explicit so custom prod nginx layouts still hit FastAPI)
    location = /developers {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Sitemaps must never degrade to nginx/backend HTML error pages for crawlers.
    # Keep the dynamic backend sitemap during normal operation, but serve valid XML
    # if the backend is restarting when Googlebot fetches /sitemap.xml.
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 500 502 503 504 = /__sitemap-index-fallback.xml;
    }

    # Marketing/static page sitemap is source-controlled XML; serve it without
    # depending on FastAPI so Googlebot always receives a supported sitemap type.
    location = /sitemap/pages.xml {
        alias /root/autorig-online/static/sitemap.xml;
        default_type application/xml;
    }

    location = /__sitemap-index-fallback.xml {
        internal;
        alias /root/autorig-online/static/sitemap-index-fallback.xml;
        default_type application/xml;
    }

    location = /__sitemap-empty-fallback.xml {
        internal;
        alias /root/autorig-online/static/sitemap-empty-fallback.xml;
        default_type application/xml;
    }

    location ~ ^/sitemap/(gallery/part/[0-9]+|videos)\.xml$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 500 502 503 504 = /__sitemap-empty-fallback.xml;
    }


    # Global skill markdown published outside FastAPI routing.
    location = /global-skill-ai-architect_v001.md {
        root /root/autorig-online/static;
        types { text/markdown md markdown; }
        default_type text/markdown;
        charset utf-8;
        charset_types text/markdown;
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    # Main pages - proxy to backend for dynamic routing
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Block access to sensitive paths
    location ~ /\. {
        deny all;
    }
    
    # Robots.txt
    location = /robots.txt {
        alias /root/autorig-online/static/robots.txt;
    }

    # Favicon (default browser request); same asset as index <link rel="icon">
    location = /favicon.ico {
        alias /root/autorig-online/static/images/logo/favicon.svg;
        default_type image/svg+xml;
        expires 7d;
        add_header Cache-Control "public";
    }
}

# Redirect www to non-www
server {
    listen 443 ssl http2;
    server_name www.autorig.online;
    
    ssl_certificate /etc/letsencrypt/live/autorig.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autorig.online/privkey.pem;
    
    return 301 https://autorig.online$request_uri;
}
