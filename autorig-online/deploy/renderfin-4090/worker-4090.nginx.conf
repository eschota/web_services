server {
    listen 37.187.57.177:80;
    server_name worker-4090.renderfin.qwertystock.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name worker-4090.renderfin.qwertystock.com;

    ssl_certificate /etc/letsencrypt/live/renderfin-workers.qwertystock.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/renderfin-workers.qwertystock.com/privkey.pem;
    client_max_body_size 64m;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;

    location = /edge-health {
        default_type application/json;
        return 200 '{"ok":true,"edge":"way","worker":"4090"}';
    }

    location = /health/4090 {
        auth_basic "SECS Renderfin";
        auth_basic_user_file /etc/nginx/renderfin.qwertystock.com.htpasswd;
        proxy_pass http://127.0.0.1:19409/system_stats;
        proxy_connect_timeout 3s;
        proxy_read_timeout 10s;
        add_header Cache-Control "no-store" always;
        add_header X-Renderfin-Worker "4090" always;
    }

    location / {
        auth_basic "SECS Renderfin";
        auth_basic_user_file /etc/nginx/renderfin.qwertystock.com.htpasswd;
        limit_except GET POST { deny all; }
        proxy_pass http://127.0.0.1:19409;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization "";
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_connect_timeout 10s;
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
        add_header Cache-Control "no-store" always;
        add_header X-Renderfin-Worker "4090" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
}
