# Paste this block INSIDE the server { listen 443 ... } block of autorig.online,
# BEFORE "location /api/ {", then: nginx -t && systemctl reload nginx
#
# VPN Gateway API (QwertyStock VPN)

    location /vpn/ {
        proxy_pass http://127.0.0.1:5000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, X-API-Key" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
